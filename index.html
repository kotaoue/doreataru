<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルーレット</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-562Q79X05Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-562Q79X05Z');
  </script>
  <style>
    :root {
      --frame-color: #33a4ff;
      --frame-width: 2px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(circle at 10% 16%, #e7f7ff 0%, transparent 36%),
        radial-gradient(circle at 88% 14%, #d9f1ff 0%, transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #f4fbff 100%);
      color: #1f3d6b;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .panel-title {
      font-size: 1.4rem;
      line-height: 1.2;
      min-height: 1.68rem;
      letter-spacing: 0.08em;
      color: #1889ff;
      text-shadow: 0 2px 0 #ffffff, 0 10px 20px #1889ff2e;
    }

    .roulette-title {
      text-align: center;
    }

    .sidebar-title {
      display: block;
      color: #3e5f90;
      font-weight: 600;
      font-size: 0.82rem;
      line-height: 1.4;
      min-height: 1.68rem;
      letter-spacing: 0;
      text-align: center;
      text-shadow: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 480px) 220px;
      column-gap: 24px;
      row-gap: 12px;
      align-items: flex-start;
      width: 100%;
      max-width: 860px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 220px;
    }

    .sidebar label {
      font-size: 0.82rem;
      color: #3e5f90;
      font-weight: 600;
    }

    textarea {
      background: #ffffff;
      border: var(--frame-width) solid var(--frame-color);
      color: #1f3d6b;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 8px;
      border-radius: 12px;
      resize: vertical;
      min-height: 180px;
      box-shadow: 0 8px 20px #6fbeff26;
    }

    textarea:focus {
      outline: none;
      border-color: var(--frame-color);
      box-shadow: 0 0 0 4px #33a4ff24;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: linear-gradient(135deg, #57beff 0%, #1889ff 100%);
      border: var(--frame-width) solid var(--frame-color);
      color: #ffffff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 10px 18px #2697ff42;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 24px #2697ff5a;
    }

    button:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
    }

    #canvas {
      display: block;
      max-width: min(480px, calc(100vw - 32px));
      border: var(--frame-width) solid var(--frame-color);
      border-radius: 16px;
      background: #ffffff;
      filter: drop-shadow(0 14px 28px #2f80ed26);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      border: var(--frame-width) solid var(--frame-color);
      color: #1f3d6b;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 10px 24px #8ec5ff44;
    }

    .toast.show {
      opacity: 1;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #ffffff;
      border: var(--frame-width) solid var(--frame-color);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 40px #33a4ff3d;
    }

    .modal-header {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1889ff;
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      padding: 10px;
      border: var(--frame-width) solid var(--frame-color);
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1f3d6b;
      margin-bottom: 16px;
      box-sizing: border-box;
      font-family: inherit;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--frame-color);
      box-shadow: 0 0 0 4px #33a4ff24;
    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-button {
      padding: 8px 16px;
      border: var(--frame-width) solid var(--frame-color);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .modal-button-ok {
      background: linear-gradient(135deg, #57beff 0%, #1889ff 100%);
      color: #ffffff;
      box-shadow: 0 8px 16px #2697ff42;
    }

    .modal-button-ok:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 10px 20px #2697ff5a;
    }

    .modal-button-cancel {
      background: #f0f4f8;
      color: #3e5f90;
    }

    .modal-button-cancel:hover {
      background: #e0e8f0;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        width: 100%;
      }

      .sidebar-title,
      .roulette-title {
        text-align: center;
      }
    }
  </style>

</head>

<body>
  <div class="layout">
    <h1 class="panel-title roulette-title">ルーレット</h1>
    <label class="panel-title sidebar-title" for="items">項目リスト（1行に1つ）</label>

    <canvas id="canvas" width="480" height="480"></canvas>

    <div class="sidebar">
      <textarea id="items">✊️
✌️
🖐️</textarea>
      <div class="btn-group">
        <button id="btnSpin">START</button>
        <button id="btnShare">抽選URLをコピー</button>
        <button id="btnDownload" disabled>結果を動画でDL</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">項目を編集する？</div>
      <input type="text" class="modal-input" id="editInput" placeholder="新しい項目" />
      <div class="modal-buttons">
        <button class="modal-button modal-button-cancel" id="editCancel">キャンセル</button>
        <button class="modal-button modal-button-ok" id="editOK">確定</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    // ── Palette ───────────────────────────────────────────────────────────
    const COLORS = [
      '#FFD700',  // 黄色
      '#FFC700',  // オレンジ黄
      '#FF9D00',  // オレンジ
      '#FF6B00',  // 赤オレンジ
      '#FF0000',  // 赤
      '#FF1493',  // ピンク
      '#9B1FFF',  // 紫
      '#6B3FFF',  // 青紫
      '#0066FF',  // 青
      '#00BFFF',  // シアン
    ];

    const FRAME_COLOR = '#33a4ff';
    const FRAME_WIDTH = 2;

    // ── Canvas setup ──────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const CX = W / 2;
    const CY = H / 2;
    const R = Math.min(W, H) / 2 - 32;  // 32px margin leaves room for pointer

    // ── State ─────────────────────────────────────────────────────────────
    let wheelAngle = 0;
    let spinning = false;
    let animId = null;
    let recorder = null;
    let recChunks = [];
    let lastVideoBlob = null;

    // ── DOM ───────────────────────────────────────────────────────────────
    const textarea = document.getElementById('items');
    const btnSpin = document.getElementById('btnSpin');
    const btnShare = document.getElementById('btnShare');
    const btnDl = document.getElementById('btnDownload');
    const toastEl = document.getElementById('toast');
    const editModal = document.getElementById('editModal');
    const editInput = document.getElementById('editInput');
    const editOK = document.getElementById('editOK');
    const editCancel = document.getElementById('editCancel');

    // ── URL ↔ textarea ────────────────────────────────────────────────────
    (function loadFromUrl() {
      const q = new URLSearchParams(location.search).get('q');
      if (q) textarea.value = q;
    })();

    function syncUrl() {
      const q = textarea.value.trim();
      const url = new URL(location.href);
      q ? url.searchParams.set('q', q) : url.searchParams.delete('q');
      history.replaceState(null, '', url.toString());
    }

    textarea.addEventListener('input', () => { syncUrl(); draw(); });

    // ── Custom Modal Dialog ───────────────────────────────────────────────
    function showEditDialog(initialValue) {
      return new Promise((resolve) => {
        editInput.value = initialValue;
        editModal.classList.add('show');
        editInput.focus();

        const handleOK = () => {
          const value = editInput.value.trim();
          cleanup();
          resolve(value || null);
        };

        const handleCancel = () => {
          cleanup();
          resolve(null);
        };

        const handleKeyDown = (e) => {
          if (e.key === 'Enter') handleOK();
          if (e.key === 'Escape') handleCancel();
        };

        const cleanup = () => {
          editModal.classList.remove('show');
          editOK.removeEventListener('click', handleOK);
          editCancel.removeEventListener('click', handleCancel);
          editInput.removeEventListener('keydown', handleKeyDown);
        };

        editOK.addEventListener('click', handleOK);
        editCancel.addEventListener('click', handleCancel);
        editInput.addEventListener('keydown', handleKeyDown);
      });
    }

    // ── Canvas click editing ──────────────────────────────────────────────
    canvas.addEventListener('click', async (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      const dx = clickX - CX;
      const dy = clickY - CY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Check if click is within the wheel
      if (dist > 18 && dist < R) {
        const angle = Math.atan2(dy, dx) + Math.PI / 2;
        const items = getItems();
        if (items.length === 0) return;

        const n = items.length;
        const arc = (Math.PI * 2) / n;
        const normalizedAngle = (angle - wheelAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const sectorIdx = Math.floor(normalizedAngle / arc) % n;

        const currentText = items[sectorIdx];
        const newText = await showEditDialog(currentText);

        if (newText !== null && newText !== '') {
          items[sectorIdx] = newText;
          textarea.value = items.join('\n');
          syncUrl();
          draw();
        }
      }
    });

    // ── Items ─────────────────────────────────────────────────────────────
    function getItems() {
      return textarea.value.split('\n').map(s => s.trim()).filter(Boolean);
    }

    // ── Drawing ───────────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const items = getItems();
      items.length === 0 ? drawEmptyWheel() : drawWheel(items);
      drawPointer();
    }

    function drawEmptyWheel() {
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = FRAME_COLOR;
      ctx.lineWidth = FRAME_WIDTH;
      ctx.stroke();
      ctx.fillStyle = '#4f6e95';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('項目を入力してください', CX, CY);
    }

    function drawWheel(items) {
      const n = items.length;
      const arc = (Math.PI * 2) / n;
      const fontSize = Math.max(9, Math.min(16, Math.floor(200 / n)));

      for (let i = 0; i < n; i++) {
        const start = wheelAngle + arc * i - Math.PI / 2;
        const end = start + arc;

        // Sector
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.arc(CX, CY, R, start, end);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label at sector midpoint
        const mid = start + arc / 2;
        const tx = CX + Math.cos(mid) * (R * 0.68);
        const ty = CY + Math.sin(mid) * (R * 0.68);
        const label = items[i].length > 9 ? items[i].slice(0, 8) + '…' : items[i];

        ctx.save();
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.translate(tx, ty);
        ctx.rotate(mid + Math.PI / 2);
        ctx.fillText(label, 0, 0);
        ctx.restore();
      }

      // Keep roulette outline consistent with other UI frames
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.strokeStyle = FRAME_COLOR;
      ctx.lineWidth = FRAME_WIDTH;
      ctx.stroke();

      // Center cap
      ctx.beginPath();
      ctx.arc(CX, CY, 18, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = FRAME_COLOR;
      ctx.lineWidth = FRAME_WIDTH;
      ctx.stroke();
    }

    function drawPointer() {
      // Gold triangle pointing down at the wheel's top edge
      const tipY = CY - R - 2;
      const baseY = tipY - 20;
      const hw = 10;

      ctx.save();
      ctx.shadowColor = '#ffd70080';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(CX, tipY);
      ctx.lineTo(CX - hw, baseY);
      ctx.lineTo(CX + hw, baseY);
      ctx.closePath();
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    // ── Spin ──────────────────────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);

    function spin() {
      if (spinning) return;
      const items = getItems();
      if (items.length < 2) { showToast('項目を2つ以上入力してください'); return; }

      spinning = true;
      btnSpin.disabled = true;
      lastVideoBlob = null;
      btnDl.disabled = true;
      startRecording();

      const n = items.length;
      const arc = (Math.PI * 2) / n;
      const targetSector = Math.floor(Math.random() * n);
      // Place pointer somewhere in the middle 80% of the chosen sector
      const targetAngle = arc * targetSector + arc * (0.1 + 0.8 * Math.random());
      // finalAngle: ((-finalAngle) % 2π + 2π) % 2π === targetAngle
      //   => finalAngle = -targetAngle + k·2π  for large enough k
      const rotations = 5 + Math.floor(Math.random() * 5);
      const fullRots = Math.floor(wheelAngle / (Math.PI * 2));
      const finalAngle = -targetAngle + (fullRots + rotations) * Math.PI * 2;

      const startAngle = wheelAngle;
      const startTime = performance.now();
      const duration = 4000 + Math.random() * 2000;

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        wheelAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
        draw();

        if (t >= 1) {
          wheelAngle = finalAngle;
          spinning = false;
          btnSpin.disabled = false;
          stopRecording();
          return;
        }
        animId = requestAnimationFrame(frame);
      }
      animId = requestAnimationFrame(frame);
    }

    // ── Video recording ───────────────────────────────────────────────────
    function startRecording() {
      recChunks = [];
      if (!canvas.captureStream) return;
      try {
        const stream = canvas.captureStream(30);
        const mimeType = ['video/webm;codecs=vp9', 'video/webm'].find(
          t => MediaRecorder.isTypeSupported(t)
        ) ?? 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType });
        recorder.ondataavailable = e => { if (e.data?.size > 0) recChunks.push(e.data); };
        recorder.onstop = () => {
          lastVideoBlob = new Blob(recChunks, { type: 'video/webm' });
          btnDl.disabled = false;
        };
        recorder.start();
      } catch (e) {
        console.warn('Recording unavailable:', e);
        recorder = null;
      }
    }

    function stopRecording() {
      if (!recorder || recorder.state === 'inactive') return;
      // Wait 1.5 s so the result display is included in the recording
      setTimeout(() => { if (recorder?.state !== 'inactive') recorder.stop(); }, 1500);
    }

    btnDl.addEventListener('click', () => {
      if (!lastVideoBlob) return;
      const url = URL.createObjectURL(lastVideoBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'roulette.webm';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    });

    // ── Share ─────────────────────────────────────────────────────────────
    btnShare.addEventListener('click', () => {
      syncUrl();
      const url = location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(
          () => showToast('URLをコピーしました！'),
          () => showToast(url)
        );
      } else {
        showToast(url);
      }
    });

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    // ── Init ──────────────────────────────────────────────────────────────
    draw();
  </script>
</body>

</html>
