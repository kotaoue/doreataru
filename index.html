<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ルーレット</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-562Q79X05Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-562Q79X05Z');

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0f;
      color: #c8d6e5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: #7efff5;
      text-shadow: 0 0 12px #7efff580;
    }

    .layout {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      max-width: 860px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 0 0 220px;
    }

    .sidebar label {
      font-size: 0.82rem;
      color: #8fa8c0;
    }

    textarea {
      background: #0d1c2a;
      border: 1px solid #2a4a6a;
      color: #c8d6e5;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 8px;
      border-radius: 4px;
      resize: vertical;
      min-height: 180px;
    }

    textarea:focus {
      outline: none;
      border-color: #3a6ea8;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      background: #0e2233;
      border: 1px solid #3a6ea8;
      color: #7ecfff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 4px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    button:hover:not(:disabled) {
      background: #143050;
      box-shadow: 0 0 8px #3a6ea860;
    }

    button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #result {
      margin-top: 4px;
      text-align: center;
      font-size: 1rem;
      font-weight: bold;
      min-height: 1.8em;
      color: #ffd700;
      text-shadow: 0 0 8px #ffd70080;
    }

    #canvas {
      display: block;
      max-width: min(480px, calc(100vw - 32px));
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #0d2a40;
      border: 1px solid #3a6ea8;
      color: #7efff5;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <h1>ルーレット</h1>

  <div class="layout">
    <div class="sidebar">
      <label for="items">項目リスト（1行に1つ）</label>
      <textarea id="items" placeholder="りんご&#10;ばなな&#10;みかん&#10;ぶどう&#10;いちご"></textarea>
      <div class="btn-group">
        <button id="btnSpin">回す</button>
        <button id="btnShare">URLをコピー</button>
        <button id="btnDownload" disabled>動画をDL</button>
      </div>
      <div id="result"></div>
    </div>

    <canvas id="canvas" width="480" height="480"></canvas>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    // ── Palette ───────────────────────────────────────────────────────────
    const COLORS = [
      '#e74c3c', '#e67e22', '#f39c12', '#f1c40f', '#2ecc71',
      '#1abc9c', '#3498db', '#9b59b6', '#e91e63', '#00bcd4',
      '#8bc34a', '#ff5722', '#607d8b', '#009688', '#673ab7',
      '#ff9800', '#4caf50', '#2196f3', '#9c27b0', '#ff4081',
    ];

    // ── Canvas setup ──────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;
    const CX = W / 2;
    const CY = H / 2;
    const R = Math.min(W, H) / 2 - 32;  // 32px margin leaves room for pointer

    // ── State ─────────────────────────────────────────────────────────────
    let wheelAngle = 0;
    let spinning = false;
    let animId = null;
    let recorder = null;
    let recChunks = [];
    let lastVideoBlob = null;

    // ── DOM ───────────────────────────────────────────────────────────────
    const textarea = document.getElementById('items');
    const btnSpin = document.getElementById('btnSpin');
    const btnShare = document.getElementById('btnShare');
    const btnDl = document.getElementById('btnDownload');
    const resultDiv = document.getElementById('result');
    const toastEl = document.getElementById('toast');

    // ── URL ↔ textarea ────────────────────────────────────────────────────
    (function loadFromUrl() {
      const q = new URLSearchParams(location.search).get('q');
      if (q) textarea.value = q;
    })();

    function syncUrl() {
      const q = textarea.value.trim();
      const url = new URL(location.href);
      q ? url.searchParams.set('q', q) : url.searchParams.delete('q');
      history.replaceState(null, '', url.toString());
    }

    textarea.addEventListener('input', () => { syncUrl(); draw(); });

    // ── Items ─────────────────────────────────────────────────────────────
    function getItems() {
      return textarea.value.split('\n').map(s => s.trim()).filter(Boolean);
    }

    // ── Drawing ───────────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const items = getItems();
      items.length === 0 ? drawEmptyWheel() : drawWheel(items);
      drawPointer();
    }

    function drawEmptyWheel() {
      ctx.beginPath();
      ctx.arc(CX, CY, R, 0, Math.PI * 2);
      ctx.fillStyle = '#1a2a3a';
      ctx.fill();
      ctx.strokeStyle = '#2a4a6a';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#566880';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('項目を入力してください', CX, CY);
    }

    function drawWheel(items) {
      const n = items.length;
      const arc = (Math.PI * 2) / n;
      const fontSize = Math.max(9, Math.min(16, Math.floor(200 / n)));

      for (let i = 0; i < n; i++) {
        const start = wheelAngle + arc * i - Math.PI / 2;
        const end = start + arc;

        // Sector
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.arc(CX, CY, R, start, end);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        ctx.strokeStyle = '#0a0a0f';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label at sector midpoint
        const mid = start + arc / 2;
        const tx = CX + Math.cos(mid) * (R * 0.68);
        const ty = CY + Math.sin(mid) * (R * 0.68);
        const label = items[i].length > 9 ? items[i].slice(0, 8) + '…' : items[i];

        ctx.save();
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.translate(tx, ty);
        ctx.rotate(mid + Math.PI / 2);
        ctx.fillText(label, 0, 0);
        ctx.restore();
      }

      // Center cap
      ctx.beginPath();
      ctx.arc(CX, CY, 18, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a0f';
      ctx.fill();
      ctx.strokeStyle = '#3a6ea8';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawPointer() {
      // Gold triangle pointing down at the wheel's top edge
      const tipY = CY - R - 2;
      const baseY = tipY - 20;
      const hw = 10;

      ctx.save();
      ctx.shadowColor = '#ffd70080';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(CX, tipY);
      ctx.lineTo(CX - hw, baseY);
      ctx.lineTo(CX + hw, baseY);
      ctx.closePath();
      ctx.fillStyle = '#ffd700';
      ctx.fill();
      ctx.strokeStyle = '#0a0a0f';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    // ── Spin ──────────────────────────────────────────────────────────────
    btnSpin.addEventListener('click', spin);

    function spin() {
      if (spinning) return;
      const items = getItems();
      if (items.length < 2) { showToast('項目を2つ以上入力してください'); return; }

      spinning = true;
      btnSpin.disabled = true;
      resultDiv.textContent = '';
      lastVideoBlob = null;
      btnDl.disabled = true;
      startRecording();

      const n = items.length;
      const arc = (Math.PI * 2) / n;
      const targetSector = Math.floor(Math.random() * n);
      // Place pointer somewhere in the middle 80% of the chosen sector
      const targetAngle = arc * targetSector + arc * (0.1 + 0.8 * Math.random());
      // finalAngle: ((-finalAngle) % 2π + 2π) % 2π === targetAngle
      //   => finalAngle = -targetAngle + k·2π  for large enough k
      const rotations = 5 + Math.floor(Math.random() * 5);
      const fullRots = Math.floor(wheelAngle / (Math.PI * 2));
      const finalAngle = -targetAngle + (fullRots + rotations) * Math.PI * 2;

      const startAngle = wheelAngle;
      const startTime = performance.now();
      const duration = 4000 + Math.random() * 2000;

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        wheelAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
        draw();

        if (t >= 1) {
          wheelAngle = finalAngle;
          spinning = false;
          btnSpin.disabled = false;
          showResult(items);
          stopRecording();
          return;
        }
        animId = requestAnimationFrame(frame);
      }
      animId = requestAnimationFrame(frame);
    }

    function showResult(items) {
      const n = items.length;
      const arc = (Math.PI * 2) / n;
      // Normalize -wheelAngle to [0, 2π) to find the pointed sector
      const a = ((-wheelAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(a / arc) % n;
      resultDiv.textContent = '🎉 ' + items[idx];
    }

    // ── Video recording ───────────────────────────────────────────────────
    function startRecording() {
      recChunks = [];
      if (!canvas.captureStream) return;
      try {
        const stream = canvas.captureStream(30);
        const mimeType = ['video/webm;codecs=vp9', 'video/webm'].find(
          t => MediaRecorder.isTypeSupported(t)
        ) ?? 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType });
        recorder.ondataavailable = e => { if (e.data?.size > 0) recChunks.push(e.data); };
        recorder.onstop = () => {
          lastVideoBlob = new Blob(recChunks, { type: 'video/webm' });
          btnDl.disabled = false;
        };
        recorder.start();
      } catch (e) {
        console.warn('Recording unavailable:', e);
        recorder = null;
      }
    }

    function stopRecording() {
      if (!recorder || recorder.state === 'inactive') return;
      // Wait 1.5 s so the result display is included in the recording
      setTimeout(() => { if (recorder?.state !== 'inactive') recorder.stop(); }, 1500);
    }

    btnDl.addEventListener('click', () => {
      if (!lastVideoBlob) return;
      const url = URL.createObjectURL(lastVideoBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'roulette.webm';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    });

    // ── Share ─────────────────────────────────────────────────────────────
    btnShare.addEventListener('click', () => {
      syncUrl();
      const url = location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(
          () => showToast('URLをコピーしました！'),
          () => showToast(url)
        );
      } else {
        showToast(url);
      }
    });

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    // ── Init ──────────────────────────────────────────────────────────────
    draw();
  </script>
</body>

</html>
